<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeetCode Search Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            /* Subtly animated gradient background */
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #0f172a, #312e81);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            min-height: 100vh;
        }

        @keyframes gradient {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .search-input {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(139, 92, 246, 0.3);
            transition: all 0.3s ease;
        }

        .search-input:focus {
            border-color: rgba(139, 92, 246, 0.8);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.3);
            outline: none;
        }

        .result-card {
            transition: all 0.2s ease;
            animation: fadeIn 0.4s ease forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        .result-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(139, 92, 246, 0.2);
            border-color: rgba(139, 92, 246, 0.4);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="antialiased flex flex-col items-center pt-20 px-4 pb-12">

    <!-- Header Section -->
    <div class="text-center mb-10">
        <div
            class="inline-block p-3 rounded-full bg-violet-900/40 text-violet-400 mb-4 border border-violet-500/20 shadow-[0_0_15px_rgba(139,92,246,0.2)]">
            <i class="fas fa-code fa-2x"></i>
        </div>
        <h1
            class="text-4xl md:text-5xl font-bold mb-3 tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-violet-400 to-fuchsia-400">
            LeetCode Search Engine
        </h1>
        <p class="text-slate-400 max-w-lg mx-auto text-lg/relaxed">
            Find competitive programming problems instantly using BM25 algorithms and semantic matching.
        </p>
    </div>

    <!-- Main Content Container -->
    <div class="w-full max-w-3xl glass-panel rounded-2xl p-6 md:p-8">

        <!-- Search Bar -->
        <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <i class="fas fa-search text-violet-400 group-focus-within:text-violet-300 transition-colors"></i>
            </div>
            <input type="text" id="searchInput"
                class="search-input w-full pl-12 pr-12 py-4 rounded-xl text-lg text-white placeholder-slate-400 shadow-inner"
                placeholder="E.g., dynamic programming target sum..." autocomplete="off">
            <div id="loadingIndicator" class="absolute inset-y-0 right-0 pr-4 flex items-center hidden">
                <i class="fas fa-circle-notch fa-spin text-violet-400"></i>
            </div>
        </div>

        <!-- Meta Results Info -->
        <div id="resultsMeta" class="mt-6 mb-4 text-sm text-slate-400 hidden flex justify-between items-center px-1">
            <span id="resultsCount">Found 0 results</span>
            <span
                class="text-xs uppercase tracking-wider font-semibold text-violet-400/80 bg-violet-400/10 px-2 py-1 rounded">AI
                Hybrid Search</span>
        </div>

        <!-- Results Container -->
        <div id="resultsContainer" class="mt-4 space-y-3">
            <!-- Initial State -->
            <div class="text-center py-12 text-slate-500" id="initialState">
                <i class="fas fa-keyboard text-4xl mb-4 opacity-50"></i>
                <p>Start typing to search the problem repository</p>
            </div>
        </div>

    </div>

    <!-- Footer -->
    <footer class="mt-auto pt-16 text-center text-slate-500 text-sm">
        <p>Built with FastAPI & Tailwind CSS</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('searchInput');
            const resultsContainer = document.getElementById('resultsContainer');
            const loadingIndicator = document.getElementById('loadingIndicator');
            const initialState = document.getElementById('initialState');
            const resultsMeta = document.getElementById('resultsMeta');
            const resultsCount = document.getElementById('resultsCount');

            // Debounce function to limit API calls
            const debounce = (func, delay) => {
                let timeoutId;
                return (...args) => {
                    clearTimeout(timeoutId);
                    timeoutId = setTimeout(() => func(...args), delay);
                };
            };

            const performSearch = async (query) => {
                if (!query.trim()) {
                    resultsContainer.innerHTML = '';
                    resultsContainer.appendChild(initialState);
                    initialState.classList.remove('hidden');
                    resultsMeta.classList.add('hidden');
                    return;
                }

                loadingIndicator.classList.remove('hidden');

                try {
                    const response = await fetch('/api/search', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ query: query })
                    });

                    const data = await response.json();
                    renderResults(data.results);
                } catch (error) {
                    console.error('Search failed:', error);
                    resultsContainer.innerHTML = `
                        <div class="text-center py-8 text-red-400">
                            <i class="fas fa-exclamation-triangle text-2xl mb-2"></i>
                            <p>An error occurred while searching. Please try again.</p>
                        </div>
                    `;
                } finally {
                    loadingIndicator.classList.add('hidden');
                }
            };

            const renderResults = (results) => {
                resultsContainer.innerHTML = '';

                if (!results || results.length === 0) {
                    resultsMeta.classList.add('hidden');
                    resultsContainer.innerHTML = `
                        <div class="text-center py-12 text-slate-400">
                            <i class="fas fa-ghost text-4xl mb-4 opacity-50"></i>
                            <p>No matches found for your query.</p>
                        </div>
                    `;
                    return;
                }

                resultsMeta.classList.remove('hidden');
                resultsCount.textContent = `Top ${results.length} relevant problems`;

                results.forEach((result, index) => {
                    // Stagger animations
                    const animDelay = index * 0.05;

                    const el = document.createElement('a');
                    el.href = result.url;
                    el.target = '_blank';
                    el.className = 'result-card block bg-slate-800/50 hover:bg-slate-700/50 border border-slate-700 rounded-xl p-4 flex items-center justify-between group';
                    el.style.animationDelay = `${animDelay}s`;

                    el.innerHTML = `
                        <div class="flex-1 pr-4">
                            <h3 class="text-lg font-semibold text-slate-200 group-hover:text-violet-300 transition-colors truncate">
                                ${result.title}
                            </h3>
                            <div class="flex items-center mt-1 space-x-3 text-sm text-slate-500">
                                <span class="flex items-center">
                                    <i class="fas fa-link mr-1.5 text-xs"></i>
                                    <span class="truncate max-w-[200px] sm:max-w-xs">${result.url}</span>
                                </span>
                            </div>
                        </div>
                        <div class="flex flex-col items-end flex-shrink-0">
                            <span class="text-xs font-semibold text-violet-400/80 mb-1">Score</span>
                            <span class="bg-violet-500/10 text-violet-300 px-2.5 py-1 rounded-md text-sm font-mono border border-violet-500/20 shadow-sm">
                                ${result.score.toFixed(2)}
                            </span>
                        </div>
                    `;
                    resultsContainer.appendChild(el);
                });
            };

            // Listen for input events with a 300ms debounce
            searchInput.addEventListener('input', debounce((e) => {
                performSearch(e.target.value);
            }, 300));

            // Focus search input on page load
            setTimeout(() => searchInput.focus(), 100);
        });
    </script>
</body>

</html>
